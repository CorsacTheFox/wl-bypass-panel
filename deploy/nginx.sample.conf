# =============================================================================
# nginx sample config for the Whitelist-Bypass Instance Manager
#
# Install (Debian/Ubuntu):
#   sudo cp deploy/nginx.sample.conf /etc/nginx/sites-available/wb-manager
#   sudo ln -s /etc/nginx/sites-available/wb-manager /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d wb.example.com        # get Let's Encrypt cert
#   sudo nginx -t && sudo systemctl reload nginx
#
# The FastAPI/uvicorn backend is assumed to run on 127.0.0.1:8000, started via:
#   ./run.sh     (or)   WB_HOST=127.0.0.1 WB_PORT=8000 ...
#
# Recommended: run the backend under systemd so it auto-starts and restarts.
# =============================================================================

# WebSocket/upgrade mapping (must be at http{} scope — this file lives there).
# Empty string (not 'close') so upstream keepalive still works for normal
# requests; only upgrade requests get Connection: upgrade.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

# Rate-limit zone for the login endpoint (brute-force protection).
# 10 req/s per client IP, burst allowed, excess queued.
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=10r/s;

# Generic rate limit for all API traffic (optional, tune to taste).
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;

# Upstream — keep a connection pool to uvicorn (HTTP/1.1 keepalive).
upstream wb_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# -----------------------------------------------------------------------------
# HTTP -> HTTPS redirect
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name wb.example.com;

    # ACME challenge passthrough (certbot managed).
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# HTTPS (main site)
# -----------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name wb.example.com;

    # ---- TLS (replace with your cert paths; certbot manages these) ----
    ssl_certificate     /etc/letsencrypt/live/wb.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wb.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ---- Logs ----
    access_log /var/log/nginx/wb-manager.access.log;
    error_log  /var/log/nginx/wb-manager.error.log warn;

    # ---- Limits ----
    client_max_body_size 1m;       # payloads are tiny JSON; keep it small

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # The SPA loads Tailwind from a CDN; adjust CSP if you self-host assets.
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; img-src 'self' data:;" always;

    # ---- Gzip (for the single-page HTML/JS) ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json;

    # ---- Static assets served directly by nginx (faster than FastAPI) ----
    # The SPA lives in <project>/static/. Point root there.
    location /static/ {
        alias /opt/whitelist-manager/static/;
        expires 1h;
        access_log off;
        add_header Cache-Control "public";
    }

    # ---- Login: stricter rate limit ----
    location = /api/auth/login {
        limit_req zone=login_zone burst=5 nodelay;
        proxy_pass http://wb_backend;
        include /etc/nginx/snippets/wb-proxy.conf;
    }

    # ---- All other API routes ----
    location /api/ {
        limit_req zone=api_zone burst=20 nodelay;
        proxy_pass http://wb_backend;
        include /etc/nginx/snippets/wb-proxy.conf;
    }

    # ---- Everything else (SPA root + client-side fallback) ----
    location / {
        proxy_pass http://wb_backend;
        include /etc/nginx/snippets/wb-proxy.conf;
    }
}
