# =============================================================================
# Shared proxy snippet — included by every location block above.
# Drop at: /etc/nginx/snippets/wb-proxy.conf
# =============================================================================

proxy_http_version 1.1;

# Forward original client info so the backend sees real IPs (and so the
# protocol is reported as https). FastAPI is behind a proxy.
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;

# WebSocket / upgrade support (harmless for plain HTTP; needed if you later add
# SSE or ws-based live updates). The $connection_upgrade map is defined in the
# main site config (http{} scope).
proxy_set_header Upgrade    $http_upgrade;
proxy_set_header Connection $connection_upgrade;

# Keep the upstream connection alive (pairs with `keepalive` in upstream{}).
# (Upgrade connections override Connection via the map above.)
proxy_buffering off;

# Timeouts. HTTP requests to this app are short (start/stop/list), so 60s is
# plenty. NOTE: long-lived background *processes* are decoupled from the HTTP
# request lifecycle — they keep running on the backend after the response
# returns, so these timeouts do NOT affect relay uptime.
proxy_connect_timeout 10s;
proxy_send_timeout    60s;
proxy_read_timeout    60s;
